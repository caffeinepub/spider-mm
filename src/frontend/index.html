<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fordy Graphics – Premium Telegram Graphics</title>
    <style>
      html, body {
        background: #080808;
        margin: 0;
        padding: 0;
      }
      /* Critical inline background so it appears before React renders */
      #root-bg {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: radial-gradient(ellipse at 30% 40%, #1a1a2e 0%, #0b0b0b 60%, #080808 100%);
        z-index: 0;
        pointer-events: none;
      }
      #root-bg img {
        width: 100%; height: 100%;
        object-fit: cover;
        object-position: center center;
        display: block;
      }
    </style>
    <!-- Preload the background image for instant display -->
    <link rel="preload" href="/assets/web_bg_1-019d448b-d0d2-7159-8482-016d6af60f56.png" as="image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Instant background before React loads -->
    <div id="root-bg">
      <img
        src="/assets/web_bg_1-019d448b-d0d2-7159-8482-016d6af60f56.png"
        alt=""
        fetchpriority="high"
        decoding="sync"
      />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
